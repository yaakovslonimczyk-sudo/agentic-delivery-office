<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DCE9F7"/>
    </marker>
    <marker id="arrT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8FD8EA"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#142F54"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <text x="800" y="56" text-anchor="middle" fill="#DCE9F7" font-size="26" font-weight="bold">WHAT CROSSES THE BOUNDARY</text>
  <text x="800" y="88" text-anchor="middle" fill="#A9C1DD" font-size="16" font-style="italic">total tokens go up 3-5× — the orchestrator's context is what you're protecting</text>

  <!-- orchestrator panel -->
  <rect x="80" y="160" width="560" height="540" rx="10" fill="#1B3A63" stroke="#DCE9F7" stroke-width="3"/>
  <rect x="80" y="160" width="560" height="52" fill="#DCE9F7"/>
  <text x="360" y="194" text-anchor="middle" fill="#142F54" font-size="19" font-weight="bold">THE ORCHESTRATOR'S CONTEXT</text>
  <g font-size="15" fill="#DCE9F7">
    <rect x="120" y="244" width="480" height="56" rx="5" fill="#142F54" stroke="#DCE9F7" stroke-width="1.5"/>
    <text x="140" y="278">the spec, restated and approved</text>
    <rect x="120" y="316" width="480" height="56" rx="5" fill="#142F54" stroke="#DCE9F7" stroke-width="1.5"/>
    <text x="140" y="350">every gate verdict and human adjustment</text>
    <rect x="120" y="388" width="480" height="56" rx="5" fill="#142F54" stroke="#DCE9F7" stroke-width="1.5"/>
    <text x="140" y="422">the shortcuts list, the roster, the plan</text>
    <rect x="120" y="460" width="480" height="56" rx="5" fill="#24507D" stroke="#8FD8EA" stroke-width="1.5"/>
    <text x="140" y="494">conclusions from every specialist — only</text>
  </g>
  <text x="360" y="572" text-anchor="middle" fill="#8FD8EA" font-size="16" font-weight="bold">stays lean for the whole engagement</text>
  <text x="360" y="600" text-anchor="middle" fill="#A9C1DD" font-size="13" font-style="italic">a long autonomous session that still remembers</text>
  <text x="360" y="620" text-anchor="middle" fill="#A9C1DD" font-size="13" font-style="italic">what you said at Gate 1 — that is the asset</text>

  <!-- the boundary -->
  <line x1="720" y1="160" x2="720" y2="760" stroke="#FF8B7E" stroke-width="3" stroke-dasharray="12 8"/>
  <text x="720" y="792" text-anchor="middle" fill="#FF8B7E" font-size="14" font-weight="bold">THE CONTEXT BOUNDARY</text>

  <!-- specialist room -->
  <rect x="830" y="160" width="690" height="540" rx="10" fill="#1B3A63" stroke="#8FD8EA" stroke-width="3"/>
  <rect x="830" y="160" width="690" height="52" fill="#8FD8EA"/>
  <text x="1175" y="194" text-anchor="middle" fill="#1B3A63" font-size="19" font-weight="bold">THE SPECIALIST'S ENGAGEMENT ROOM</text>

  <g fill="#A9C1DD" font-size="14">
    <rect x="880" y="330" width="590" height="320" rx="8" fill="#142F54" stroke="#34597F" stroke-width="2"/>
    <text x="1175" y="372" text-anchor="middle" font-size="16" fill="#DCE9F7" font-weight="bold">~150,000 tokens of work happen here:</text>
    <text x="1175" y="408" text-anchor="middle">forty files read · every grep that found nothing</text>
    <text x="1175" y="436" text-anchor="middle">full test output · the EXPLAIN plans · the screenshots</text>
    <text x="1175" y="464" text-anchor="middle">three approaches tried and abandoned</text>
    <text x="1175" y="516" text-anchor="middle" font-size="18" fill="#FF8B7E" font-weight="bold">…and die here.</text>
    <text x="1175" y="560" text-anchor="middle" font-size="13" font-style="italic">no conversation history in · no noise out —</text>
    <text x="1175" y="582" text-anchor="middle" font-size="13" font-style="italic">fresh eyes are not a limitation, they are the mechanism</text>
    <text x="1175" y="628" text-anchor="middle" font-size="13" fill="#DCE9F7">the reviewer never inherits the implementer's blind spots</text>
  </g>

  <!-- brief in (drawn last, straddles the boundary) -->
  <line x1="640" y1="300" x2="876" y2="300" stroke="#DCE9F7" stroke-width="3" marker-end="url(#arr)"/>
  <rect x="555" y="236" width="330" height="46" rx="23" fill="#DCE9F7"/>
  <text x="720" y="265" text-anchor="middle" fill="#142F54" font-size="14" font-weight="bold">BRIEF IN — self-contained, ~1k tokens</text>
  <rect x="540" y="316" width="360" height="26" rx="13" fill="#142F54"/>
  <text x="720" y="334" text-anchor="middle" fill="#A9C1DD" font-size="12" font-style="italic">spec · paths · conventions · return contract</text>

  <!-- conclusions out (drawn last, straddles the boundary) -->
  <line x1="876" y1="560" x2="640" y2="560" stroke="#8FD8EA" stroke-width="3" marker-end="url(#arrT)"/>
  <rect x="555" y="578" width="330" height="46" rx="23" fill="#8FD8EA"/>
  <text x="720" y="607" text-anchor="middle" fill="#1B3A63" font-size="14" font-weight="bold">CONCLUSIONS OUT — ~0.5k tokens</text>
  <rect x="540" y="518" width="360" height="26" rx="13" fill="#142F54"/>
  <text x="720" y="536" text-anchor="middle" fill="#A9C1DD" font-size="12" font-style="italic">findings with evidence, or APPROVED</text>

  <!-- bottom tagline -->
  <text x="800" y="836" text-anchor="middle" fill="#DCE9F7" font-size="16" font-weight="bold" font-style="italic">you are spending tokens to buy context hygiene — and context hygiene is quality.</text>

  <!-- title block stamp -->
  <g font-family="Menlo, Courier New, monospace">
    <rect x="1150" y="850" width="420" height="44" fill="#142F54" stroke="#DCE9F7" stroke-width="1.5"/>
    <line x1="1150" y1="866" x2="1570" y2="866" stroke="#DCE9F7" stroke-width="1"/>
    <line x1="1150" y1="880" x2="1570" y2="880" stroke="#DCE9F7" stroke-width="1"/>
    <text x="1158" y="862" font-size="10" font-weight="bold" fill="#DCE9F7">YAAKOV SLONIMCZYK — SOLUTION ARCHITECT</text>
    <text x="1158" y="877" font-size="9" fill="#A9C1DD">SERIES: THE AGENTIC DELIVERY OFFICE</text>
    <text x="1158" y="891" font-size="9" fill="#FF8B7E">FIG. 05 · CONTEXT ISOLATION · REV A · 2026</text>
  </g>
</svg>
