<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DCE9F7"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#142F54"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- CLIENT -->
  <rect x="640" y="40" width="320" height="78" rx="6" fill="#DCE9F7"/>
  <text x="800" y="74" text-anchor="middle" fill="#142F54" font-size="22" font-weight="bold">THE CLIENT</text>
  <text x="800" y="100" text-anchor="middle" fill="#44608C" font-size="14">human judgment, spent only at the gates</text>

  <!-- client <-> orchestrator -->
  <line x1="800" y1="118" x2="800" y2="186" stroke="#DCE9F7" stroke-width="2" marker-end="url(#arr)" marker-start="url(#arr)"/>
  <text x="816" y="158" fill="#FF8B7E" font-size="13" font-style="italic">decisions, never logs</text>

  <!-- ORCHESTRATOR -->
  <rect x="470" y="190" width="660" height="120" rx="8" fill="#1B3A63" stroke="#DCE9F7" stroke-width="3"/>
  <rect x="470" y="190" width="660" height="40" rx="8" fill="#8FD8EA"/>
  <rect x="470" y="218" width="660" height="12" fill="#8FD8EA"/>
  <text x="800" y="217" text-anchor="middle" fill="#1B3A63" font-size="20" font-weight="bold">THE ORCHESTRATOR  ·  SOLUTION ARCHITECT</text>
  <text x="800" y="256" text-anchor="middle" fill="#DCE9F7" font-size="15">main session · frontier model · the only persistent memory</text>
  <text x="800" y="280" text-anchor="middle" fill="#A9C1DD" font-size="14">holds the spec, the gate verdicts, the shortcuts list — delegates everything verbose</text>

  <!-- briefs down / conclusions up -->
  <line x1="650" y1="310" x2="440" y2="392" stroke="#DCE9F7" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="950" y1="310" x2="1160" y2="392" stroke="#DCE9F7" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="400" x2="710" y2="318" stroke="#8FD8EA" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <line x1="1100" y1="400" x2="890" y2="318" stroke="#8FD8EA" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="430" y="350" text-anchor="end" fill="#DCE9F7" font-size="13" font-style="italic">self-contained briefs in</text>
  <text x="1170" y="350" fill="#8FD8EA" font-size="13" font-style="italic">conclusions only, out</text>

  <!-- SENIOR BENCH -->
  <rect x="70" y="400" width="700" height="380" rx="8" fill="none" stroke="#DCE9F7" stroke-width="2"/>
  <rect x="70" y="400" width="700" height="44" fill="#DCE9F7"/>
  <text x="420" y="429" text-anchor="middle" fill="#142F54" font-size="17" font-weight="bold">SENIOR BENCH — frontier model (inherits the session)</text>

  <g font-size="15" font-weight="bold" fill="#DCE9F7">
    <rect x="100" y="470" width="200" height="84" rx="5" fill="#1B3A63" stroke="#DCE9F7" stroke-width="2"/>
    <text x="200" y="500" text-anchor="middle">planner</text>
    <rect x="320" y="470" width="200" height="84" rx="5" fill="#1B3A63" stroke="#DCE9F7" stroke-width="2"/>
    <text x="420" y="500" text-anchor="middle">code reviewer</text>
    <rect x="540" y="470" width="200" height="84" rx="5" fill="#1B3A63" stroke="#DCE9F7" stroke-width="2"/>
    <text x="640" y="500" text-anchor="middle">security reviewer</text>
    <rect x="100" y="580" width="200" height="84" rx="5" fill="#1B3A63" stroke="#DCE9F7" stroke-width="2"/>
    <text x="200" y="610" text-anchor="middle">refuters</text>
    <rect x="320" y="580" width="200" height="84" rx="5" fill="#1B3A63" stroke="#DCE9F7" stroke-width="2"/>
    <text x="420" y="610" text-anchor="middle">HLD architect</text>
    <rect x="540" y="580" width="200" height="84" rx="5" fill="#1B3A63" stroke="#DCE9F7" stroke-width="2"/>
    <text x="640" y="610" text-anchor="middle">deck architect</text>
  </g>
  <g font-size="12" fill="#A9C1DD">
    <text x="200" y="522" text-anchor="middle">errors compound</text>
    <text x="200" y="538" text-anchor="middle">through every phase</text>
    <text x="420" y="522" text-anchor="middle">a shallow APPROVED</text>
    <text x="420" y="538" text-anchor="middle">looks like a real one</text>
    <text x="640" y="522" text-anchor="middle">silent failure</text>
    <text x="640" y="538" text-anchor="middle">domain</text>
    <text x="200" y="632" text-anchor="middle">overrule reviewers —</text>
    <text x="200" y="648" text-anchor="middle">never weaker than them</text>
    <text x="420" y="632" text-anchor="middle">stakeholder-facing,</text>
    <text x="420" y="648" text-anchor="middle">judgment-dense</text>
    <text x="640" y="632" text-anchor="middle">stakeholder-facing,</text>
    <text x="640" y="648" text-anchor="middle">judgment-dense</text>
  </g>
  <text x="420" y="720" text-anchor="middle" fill="#FF8B7E" font-size="14" font-weight="bold">judgment the loop acts on unverified — never downgraded</text>

  <!-- JUNIOR BENCH -->
  <rect x="830" y="400" width="700" height="380" rx="8" fill="none" stroke="#8FD8EA" stroke-width="2"/>
  <rect x="830" y="400" width="700" height="44" fill="#8FD8EA"/>
  <text x="1180" y="429" text-anchor="middle" fill="#1B3A63" font-size="17" font-weight="bold">JUNIOR BENCH — one tier below (one roster line)</text>

  <g font-size="15" font-weight="bold" fill="#DCE9F7">
    <rect x="860" y="470" width="200" height="84" rx="5" fill="#1B3A63" stroke="#8FD8EA" stroke-width="2"/>
    <text x="960" y="500" text-anchor="middle">explorer</text>
    <rect x="1080" y="470" width="200" height="84" rx="5" fill="#1B3A63" stroke="#8FD8EA" stroke-width="2"/>
    <text x="1180" y="500" text-anchor="middle">mockup builder</text>
    <rect x="1300" y="470" width="200" height="84" rx="5" fill="#1B3A63" stroke="#8FD8EA" stroke-width="2"/>
    <text x="1400" y="500" text-anchor="middle">test writer</text>
    <rect x="860" y="580" width="200" height="84" rx="5" fill="#1B3A63" stroke="#8FD8EA" stroke-width="2"/>
    <text x="960" y="610" text-anchor="middle">DB reviewer</text>
    <rect x="1080" y="580" width="200" height="84" rx="5" fill="#1B3A63" stroke="#8FD8EA" stroke-width="2"/>
    <text x="1180" y="610" text-anchor="middle">design reviewer</text>
    <rect x="1300" y="580" width="200" height="84" rx="5" fill="#1B3A63" stroke="#8FD8EA" stroke-width="2"/>
    <text x="1400" y="610" text-anchor="middle">business reviewer</text>
  </g>
  <g font-size="12" fill="#A9C1DD">
    <text x="960" y="522" text-anchor="middle">briefs re-checked</text>
    <text x="960" y="538" text-anchor="middle">downstream</text>
    <text x="1180" y="522" text-anchor="middle">faces the human</text>
    <text x="1180" y="538" text-anchor="middle">at Gate 1</text>
    <text x="1400" y="522" text-anchor="middle">tests RUN —</text>
    <text x="1400" y="538" text-anchor="middle">self-verifying</text>
    <text x="960" y="632" text-anchor="middle">EXPLAIN output</text>
    <text x="960" y="648" text-anchor="middle">required</text>
    <text x="1180" y="632" text-anchor="middle">screenshots</text>
    <text x="1180" y="648" text-anchor="middle">required</text>
    <text x="1400" y="632" text-anchor="middle">CFO·BizDev·BI·CEO lenses,</text>
    <text x="1400" y="648" text-anchor="middle">evidence-or-silence</text>
  </g>
  <text x="1180" y="720" text-anchor="middle" fill="#8FD8EA" font-size="14" font-weight="bold">output checked by ground truth — failures get caught</text>

  <!-- annotation -->
  <text x="800" y="816" text-anchor="middle" fill="#DCE9F7" font-size="15" font-style="italic">specialists never talk to each other — every engagement starts with a fresh, isolated context</text>

  <!-- title block stamp -->
  <g font-family="Menlo, Courier New, monospace">
    <rect x="1150" y="828" width="420" height="58" fill="#142F54" stroke="#DCE9F7" stroke-width="1.5"/>
    <line x1="1150" y1="848" x2="1570" y2="848" stroke="#DCE9F7" stroke-width="1"/>
    <line x1="1150" y1="867" x2="1570" y2="867" stroke="#DCE9F7" stroke-width="1"/>
    <text x="1160" y="842" font-size="11" font-weight="bold" fill="#DCE9F7">YAAKOV SLONIMCZYK — SOLUTION ARCHITECT</text>
    <text x="1160" y="861" font-size="10" fill="#A9C1DD">SERIES: THE AGENTIC DELIVERY OFFICE</text>
    <text x="1160" y="880" font-size="10" fill="#FF8B7E">FIG. 01 · THE ORG CHART · REV A · 2026</text>
  </g>
</svg>
